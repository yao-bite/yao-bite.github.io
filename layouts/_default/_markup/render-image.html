{{- $src := .Destination -}}
{{- with .Page.Resources.Get .Destination -}}
  {{- $src = .RelPermalink -}}
{{- end -}}
<figure class="my-8">
  <img
    src="{{ $src }}"
    alt="{{ .Text }}"
    loading="lazy"
    class="w-full h-auto"
  >
  {{- with .Text -}}
  <figcaption class="text-center text-sm text-gray-500 mt-2">{{ . }}</figcaption>
  {{- end -}}
</figure>
