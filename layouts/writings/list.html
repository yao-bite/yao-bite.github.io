{{ define "main" }}

<section class="py-16 md:py-24">
  <div class="container mx-auto px-4 md:px-8 lg:px-16">
    <h1 class="text-4xl md:text-5xl  mb-16">{{ .Title }}</h1>

    <!-- Filter by Category -->
    {{ partial "categoryfilter" . }}

    <!-- Timeline Layout with Thumbnails -->
    <div class="max-w-4xl mx-auto">
      {{ range .Pages.GroupByDate "2006" }}

      <!-- Year Header -->
      <div class="mb-12">
        <h2 class="text-3xl  mb-8 text-gray-500">{{ .Key }}</h2>

        <div class="space-y-8">
          {{ range .Pages }}
            {{ partial "pagecard" . }}
          {{ end }}
        </div>
      </div>

      {{ end }}
    </div>
  </div>
</section>

{{ end }}
